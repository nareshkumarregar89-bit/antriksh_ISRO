version: '3.8'

services:
  aqi-vision-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: aqi-vision-ai:latest
    container_name: aqi_vision_ai_service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-MY_GEMINI_API_KEY}
    restart: unless-stopped
